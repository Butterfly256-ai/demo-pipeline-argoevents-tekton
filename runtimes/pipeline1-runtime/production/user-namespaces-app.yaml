apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: user-namespaces
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: demo-pipeline
  source:
    path: user-namespaces
    repoURL: https://github.com/Butterfly256-ai/demo-pipeline-argoevents-tekton.git
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
